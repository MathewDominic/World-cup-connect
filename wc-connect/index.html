<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <!-- ── Intro screen ── -->
  <div id="intro-screen">
    <div class="intro-inner">
      <div class="intro-flag" id="intro-flag">⚽</div>
      <div class="intro-title">Can you connect?</div>
      <div class="intro-sub">via World Cup squads</div>

      <div class="intro-players">
        <div class="intro-player ip-start">
          <div class="av av-xl" id="av-start"><span class="av-initials">?</span></div>
          <div class="intro-name" id="name-start"></div>
        </div>

        <div class="intro-arrow" id="intro-arrow">→</div>

        <div class="intro-player ip-end">
          <div class="av av-xl" id="av-end"><span class="av-initials">?</span></div>
          <div class="intro-name" id="name-end"></div>
        </div>
      </div>

      <button id="play-btn" class="btn btn-play" disabled>Connect</button>

      <div class="country-picker">
        <span class="picker-label">change country</span>

        <!-- Top 6 (always visible) -->
        <div class="flag-row">
          <button class="flag-btn" data-country="Argentina">🇦🇷</button>
          <button class="flag-btn" data-country="Brazil">🇧🇷</button>
          <button class="flag-btn" data-country="Germany">🇩🇪</button>
          <button class="flag-btn" data-country="France">🇫🇷</button>
          <button class="flag-btn" data-country="Spain">🇪🇸</button>
          <button class="flag-btn" data-country="England">🏴󠁧󠁢󠁥󠁮󠁧󠁿</button>
        </div>

        <!-- 12 more (collapsed) -->
        <div class="more-rows hidden" id="more-rows">
          <div class="flag-row">
            <button class="flag-btn" data-country="Portugal">🇵🇹</button>
            <button class="flag-btn" data-country="Netherlands">🇳🇱</button>
            <button class="flag-btn" data-country="Uruguay">🇺🇾</button>
            <button class="flag-btn" data-country="Mexico">🇲🇽</button>
            <button class="flag-btn" data-country="Belgium">🇧🇪</button>
            <button class="flag-btn" data-country="Croatia">🇭🇷</button>
          </div>
          <div class="flag-row">
            <button class="flag-btn" data-country="Colombia">🇨🇴</button>
            <button class="flag-btn" data-country="Japan">🇯🇵</button>
            <button class="flag-btn" data-country="South Korea">🇰🇷</button>
            <button class="flag-btn" data-country="Côte d'Ivoire">🇨🇮</button>
            <button class="flag-btn" data-country="Ghana">🇬🇭</button>
            <button class="flag-btn" data-country="Senegal">🇸🇳</button>
          </div>
        </div>

        <button class="btn-show-more" id="show-more-btn">Show more ↓</button>
        <button class="btn-random" id="random-btn">🎲 Random country</button>
      </div>
    </div>
  </div>

  <!-- ── Game screen ── -->
  <div id="game-screen" class="hidden">
    <div class="game-header">
      <span class="logo">⚽ World Cup Connect</span>
      <button id="new-game-btn" class="btn-new" title="New game">↺</button>
    </div>

    <div class="endpoints">
      <div class="endpoint">
        <div class="av av-sm" id="ep-av-start"><span class="av-initials">?</span></div>
        <div class="ep-info">
          <span class="ep-label">START</span>
          <span class="ep-name" id="start-name"></span>
        </div>
      </div>
      <div class="ep-sep">→</div>
      <div class="endpoint goal">
        <div class="ep-info ep-info-end">
          <span class="ep-label">GOAL</span>
          <span class="ep-name" id="goal-name"></span>
        </div>
        <div class="av av-sm" id="ep-av-end"><span class="av-initials">?</span></div>
      </div>
    </div>

    <div id="path-bar" class="path-bar"></div>
    <div id="step"></div>
    <button id="reveal-btn" class="btn btn-secondary">Reveal Path</button>
  </div>

  <!-- ── No-data fallback ── -->
  <div id="no-data" class="hidden" style="padding:40px 20px;text-align:center;color:#64748b;line-height:1.8">
    <p>No squad data found. Run:</p>
    <code style="display:inline-block;background:#111827;color:#22c55e;padding:6px 14px;border-radius:8px;margin-top:8px;font-size:13px">
      node scripts/scrape-squads.mjs
    </code>
  </div>

  <div id="toast" role="alert" aria-live="assertive"></div>

  <script src="data/squads.js" onerror="showNoData()"></script>
  <script src="game.js"></script>
</body>
</html>
